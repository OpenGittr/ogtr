# ogtr dashboard SPA (frontend) — served on the APP_DOMAIN host
# (ingress.yaml) by a tiny Go SPA-fallback server on :8000 (no nginx, no SSR).
#
# VITE_* values are baked at image BUILD time (they ship in the JS bundle and
# are not secrets):
#   docker build --platform linux/amd64 \
#     --build-arg VITE_API_URL=https://links.example.com \
#     --build-arg VITE_GOOGLE_CLIENT_ID=<client-id>.apps.googleusercontent.com \
#     -t <registry>/ogtr-app:<tag> frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ogtr-app
  namespace: ogtr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ogtr-app
  template:
    metadata:
      labels:
        app: ogtr-app
    spec:
      containers:
      - name: app
        # CHANGE: prefix with your registry once one is decided.
        image: ogtr-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ogtr-app
  namespace: ogtr
spec:
  selector:
    app: ogtr-app
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
