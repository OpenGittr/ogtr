# TEMPLATE — copy somewhere private outside the repo,
# fill in real values there, and apply that copy. NEVER commit real values.
#
#   cp k8s/secrets-template.yaml /path/outside/the/repo/secrets.yaml
#   $EDITOR /path/outside/the/repo/secrets.yaml
#   kubectl apply -f /path/outside/the/repo/secrets.yaml
#
# Generation:
#   JWT_SIGNING_KEY:  openssl rand -base64 48
apiVersion: v1
kind: Secret
metadata:
  name: ogtr-secrets
  namespace: ogtr
type: Opaque
stringData:
  # MySQL — any MySQL 8+ (cloud-managed or in-cluster). The server runs its
  # own migrations at boot, so the user needs DDL rights on this database.
  db-host: "CHANGE_ME_DB_HOST"
  db-user: "ogtr"
  db-password: "CHANGE_ME"

  # ogtr session-token signing key (server refuses to start without it).
  jwt-signing-key: "CHANGE_ME_GENERATE_RANDOM_STRING"

  # Google sign-in OAuth client ID (Web application type). The deployed app
  # domain (e.g. https://app.example.com) must be an Authorized JavaScript
  # origin on this client.
  google-client-id: "CHANGE_ME.apps.googleusercontent.com"

  # Google Web Risk API key (optional destination-scanning layer,
  # DEPLOYMENT.md §6). Leave empty to disable the layer.
  webrisk-api-key: ""

  # Instance admin API token (optional; ARCHITECTURE.md "Instance admin
  # API"). Empty: every /api/internal/* endpoint answers 404. Generate with
  # `openssl rand -hex 32`; any holder has full cross-organization admin
  # control — treat it like a root password.
  admin-api-token: ""
