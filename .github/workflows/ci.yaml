name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  # Build-only image checks (no registry push — none decided yet). Runners are
  # amd64, matching the deployment target platform.
  docker:
    name: docker/${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          # Both backend images build from the backend/ module root context.
          - name: server
            context: backend
            args: "-f backend/server/Dockerfile"
          - name: internal
            context: backend
            args: "-f backend/admin/Dockerfile"
          - name: app
            context: frontend
            # VITE_* are baked at build time; CI only proves the build works.
            args: >-
              --build-arg VITE_API_URL=https://short.example
              --build-arg VITE_GOOGLE_CLIENT_ID=ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --platform linux/amd64 ${{ matrix.image.args }} -t ogtr-${{ matrix.image.name }}:ci ${{ matrix.image.context }}
